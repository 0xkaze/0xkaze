name: Generate Contribution Snake

on:
  # Runs every 6 hours so the snake stays fresh
  schedule:
    - cron: "0 */6 * * *"
  # Run manually from the Actions tab
  workflow_dispatch:
  # Run on every push to main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        id: snake
        with:
          # github.repository_owner = your username, so no manual edit needed
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#9B72FF&color_dots=#161b22,#1f6feb,#4A9EFF,#6BB1FF,#00D4AA

      - name: Push to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
